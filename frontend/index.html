<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MeetFlow Dev Alignment Sim</title>
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg?v=20260405-mf1" />
    <link rel="stylesheet" href="/static/styles.css?v=20260326-ops4" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <h1>Dev Alignment Sim</h1>
        <p class="subtitle">MeetFlow - Prepare for better meetings</p>

        <label for="repoPath"> Path Or Repo URL</label>
        <input id="repoPath" type="text" placeholder="/absolute/path OR https://git-or-archive-url" />
        <button id="startSessionBtn">Start Session</button>

        <div class="session-box">
          <div><strong>Session:</strong> <span id="sessionId">-</span></div>
          <div><strong>Stack:</strong> <span id="stackSummary">-</span></div>
          <div><strong>Source:</strong> <span id="sourceSummary">-</span></div>
          <div><strong>Total Cost:</strong> <span id="costCounter">$0.000000</span></div>
          <div><strong>Total Tokens:</strong> <span id="tokenCounter">0</span></div>
          <div><strong>Input Tokens:</strong> <span id="inputTokenCounter">0</span></div>
          <div><strong>Output Tokens:</strong> <span id="outputTokenCounter">0</span></div>
          <div><strong>Last Increment:</strong> <span id="lastUsageCounter">-</span></div>
        </div>

        <div class="legend">
          <h2>Agents</h2>
          <ul id="agentLegend"></ul>
        </div>
      </aside>

      <main class="chat-area">
        <header class="chat-header">
          <div class="status-row">
            <span id="connectionStatus" class="pill offline">Offline</span>
            <div id="processingIndicator" class="processing-indicator idle" aria-live="polite">
              <svg class="processing-svg" viewBox="0 0 40 16" role="img" aria-label="Processing indicator">
                <circle class="processing-dot dot-1" cx="8" cy="8" r="3"></circle>
                <circle class="processing-dot dot-2" cx="20" cy="8" r="3"></circle>
                <circle class="processing-dot dot-3" cx="32" cy="8" r="3"></circle>
              </svg>
              <div class="processing-text">
                <span id="currentSpeaker" class="current-speaker">No active turn</span>
                <span id="nextSpeaker" class="next-speaker">Start a session to begin</span>
              </div>
            </div>
            <span id="thinkingStatus" class="thinking">Idle</span>
          </div>
        </header>

        <section id="messages" class="messages"></section>

        <footer class="composer">
          <textarea id="messageInput" placeholder="Ask the team about architecture, estimates, risks, or implementation plan..." rows="3"></textarea>
          <button id="sendBtn" disabled>Send</button>
        </footer>
      </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/marked@13.0.2/lib/marked.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.6/dist/purify.min.js"></script>
    <script src="/static/app.js?v=20260405-md1"></script>
  </body>
</html>
